      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="card"><rect width="920" height="540" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
